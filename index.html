<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Form Titip Cilok Mbak Nurul</title>
<style>
  :root{
    --primary:#0a4d8c;
    --primary-dark:#073763;
    --primary-light:#e8f1fb;
    --accent:#f4a51c;
    --bg:#eef2f7;
    --card:#ffffff;
    --text:#16243a;
    --muted:#7686a0;
    --line:#e3e9f2;
    --danger:#e05656;
    --radius:14px;
    --shadow:0 2px 12px rgba(16,42,80,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
  }
  .app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:44px}

  /* Header */
  .topbar{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;padding:22px 20px 28px;border-radius:0 0 22px 22px;
    box-shadow:0 4px 16px rgba(7,55,99,.25);
  }
  .brand{display:flex;align-items:center;gap:13px}
  .logo{
    width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;font-size:23px;
  }
  .brand-text h1{font-size:17px;font-weight:700;letter-spacing:.2px;line-height:1.25}
  .brand-text p{font-size:12px;opacity:.82;margin-top:3px}

  /* Tabs */
  .tabs{
    display:flex;gap:6px;margin:-16px 16px 0;background:#fff;padding:6px;
    border-radius:14px;box-shadow:var(--shadow);position:relative;z-index:2;
  }
  .tab{
    flex:1;border:none;background:transparent;cursor:pointer;padding:11px;
    border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);
    font-family:inherit;transition:.2s;
  }
  .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(10,77,140,.3)}

  .panel{display:none;padding:18px 16px 0}
  .panel.active{display:block}

  /* Card */
  .card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h3{font-size:15px;margin-bottom:14px;color:var(--primary-dark)}

  label{display:block;font-size:13px;font-weight:600;color:var(--text);margin:12px 0 6px}
  .card > label:first-child{margin-top:0}

  input[type=text],input:not([type]),select{
    width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:10px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--text);transition:.15s;
  }
  input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

  /* Checklist */
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .chk{
    display:flex;align-items:center;gap:8px;margin:0;font-weight:500;padding:11px 12px;
    border:1.5px solid var(--line);border-radius:10px;cursor:pointer;font-size:14px;transition:.15s;
  }
  .chk input{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
  .chk.on{border-color:var(--primary);background:var(--primary-light)}

  .cond{margin-top:10px;padding:12px;background:var(--primary-light);border-radius:10px}
  .cond label{margin-top:0}
  .hidden{display:none}

  .btn-add{
    width:100%;margin-top:16px;padding:13px;background:var(--accent);color:#3a2a00;
    border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .btn-add:active{transform:scale(.99)}

  /* Cart / cashier */
  .cart-empty{color:var(--muted);font-size:14px;text-align:center;padding:18px 0}
  .line{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px dashed var(--line)}
  .line:last-of-type{border-bottom:none}
  .line-info{flex:1;min-width:0}
  .line-title{font-size:14px;font-weight:600}
  .line-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .line-price{font-size:14px;font-weight:700;color:var(--primary-dark)}
  .line-del{width:26px;height:26px;border:none;border-radius:7px;background:#fdeaea;color:var(--danger);cursor:pointer;font-size:12px}

  .total-row{
    display:flex;justify-content:space-between;align-items:center;margin-top:14px;
    padding-top:14px;border-top:2px solid var(--line);font-size:16px;font-weight:700;
  }
  .total-row span:last-child{color:var(--primary);font-size:19px}

  .btn-primary{
    width:100%;margin-top:16px;padding:14px;background:var(--primary);color:#fff;border:none;
    border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-primary:active{transform:scale(.99)}
  .btn-primary:disabled{opacity:.6;cursor:default}

  /* Report */
  .report-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .report-head h3{margin:0}
  .btn-refresh{
    border:1.5px solid var(--line);background:#fff;color:var(--primary);padding:7px 12px;
    border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .muted{color:var(--muted);font-size:14px;text-align:center;padding:14px 0}
  .trow{display:flex;align-items:flex-start;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}
  .trow:last-child{border-bottom:none}
  .tcol-main{flex:1;min-width:0}
  .tname{font-size:14px;font-weight:700}
  .tmeta{font-size:12.5px;color:var(--text);margin-top:3px}
  .ttime{font-size:11px;color:var(--muted);margin-top:3px}
  .tprice{font-size:14px;font-weight:700;color:var(--primary-dark);white-space:nowrap}

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--primary-dark);color:#fff;padding:12px 20px;border-radius:10px;
    font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;
    box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:99;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🍢</div>
        <div class="brand-text">
          <h1>Form Titip Cilok Mbak Nurul</h1>
          <p>Karangsono</p>
        </div>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="form">Form Pesanan</button>
      <button class="tab" data-tab="report">Laporan</button>
    </nav>

    <!-- ===== TAB 1: FORM ===== -->
    <section id="tab-form" class="panel active">
      <div class="card">
        <label for="nama">Nama Pemesan</label>
        <input type="text" id="nama" placeholder="Tulis nama…" autocomplete="off">
      </div>

      <div class="card">
        <h3>Tambah Pesanan</h3>

        <label for="jenis">Jenis Tahu</label>
        <select id="jenis">
          <option value="Tahu Pentol" selected>Tahu Pentol</option>
          <option value="Tahu Kanji">Tahu Kanji</option>
        </select>

        <label for="harga">Harga</label>
        <select id="harga">
          <option value="">— Pilih harga —</option>
          <option value="2000">Rp 2.000</option>
          <option value="5000">Rp 5.000</option>
          <option value="10000">Rp 10.000</option>
        </select>

        <label>Pelengkap</label>
        <div class="checks">
          <label class="chk"><input type="checkbox" class="pl" value="Saos"> Saos</label>
          <label class="chk"><input type="checkbox" class="pl" value="Kecap"> Kecap</label>
          <label class="chk"><input type="checkbox" class="pl" id="cSambal" value="Sambal"> Sambal</label>
          <label class="chk"><input type="checkbox" class="pl" id="cKuah" value="Kuah"> Kuah</label>
        </div>

        <div id="sambalWrap" class="cond hidden">
          <label for="sambalSendok">Jumlah Sendok Sambal</label>
          <select id="sambalSendok">
            <option value="1">1 sendok</option>
            <option value="2">2 sendok</option>
            <option value="3">3 sendok</option>
            <option value="4">4 sendok</option>
            <option value="5">5 sendok</option>
          </select>
        </div>

        <div id="kuahWrap" class="cond hidden">
          <label for="kuahJml">Banyak Kuah</label>
          <select id="kuahJml">
            <option value="Banyak">Banyak</option>
            <option value="Sedikit">Sedikit</option>
          </select>
        </div>

        <button class="btn-add" onclick="addItem()">+ Tambah ke Pesanan</button>
      </div>

      <div class="card">
        <h3>Rincian Pesanan</h3>
        <div id="cartList" class="cart-empty">Belum ada item.</div>
        <div class="total-row">
          <span>Total</span>
          <span id="grandTotal">Rp 0</span>
        </div>
        <button class="btn-primary" id="btnKirim" onclick="submitOrder()">Kirim Pesanan</button>
      </div>
    </section>

    <!-- ===== TAB 2: LAPORAN ===== -->
    <section id="tab-report" class="panel">
      <div class="card">
        <div class="report-head">
          <h3>Semua Pesanan</h3>
          <button class="btn-refresh" onclick="renderReport()">↻ Muat Ulang</button>
        </div>
        <div id="reportBody"><div class="muted">Memuat…</div></div>
        <div class="total-row">
          <span>Total Keseluruhan</span>
          <span id="reportTotal">Rp 0</span>
        </div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
  /* ===== 1. ISI KONFIG FIREBASE KAMU DI SINI ===== */
  /* Ambil dari: Firebase Console > Project settings > Your apps > Config */
  const firebaseConfig = {
    apiKey: "AIzaSyC26PFr6vhgpFDqOy1EVatUUCx-ARo_WLo",
    authDomain: "tahu-pentol.firebaseapp.com",
    databaseURL: "https://tahu-pentol-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tahu-pentol",
    storageBucket: "tahu-pentol.firebasestorage.app",
    messagingSenderId: "157906863646",
    appId: "1:157906863646:web:05df3b6a1d44e4d6f0100f"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const pesananRef = database.ref('pesanan');
  // DEBUG: cek Firebase init
  console.log("✓ Firebase init OK", { database, pesananRef });
  /* =============================================== */

  var cart = [];
  var ordersCache = [];

  // --- Tabs ---
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
      t.classList.add('active');
      document.getElementById('tab-'+t.dataset.tab).classList.add('active');
      if (t.dataset.tab === 'report') renderReport();
    });
  });

  // --- Checklist visual + conditional dropdowns ---
  document.querySelectorAll('.pl').forEach(function(c){
    c.addEventListener('change', function(){
      this.closest('.chk').classList.toggle('on', this.checked);
    });
  });
  document.getElementById('cSambal').addEventListener('change', function(){
    document.getElementById('sambalWrap').classList.toggle('hidden', !this.checked);
  });
  document.getElementById('cKuah').addEventListener('change', function(){
    document.getElementById('kuahWrap').classList.toggle('hidden', !this.checked);
  });

  function rupiah(n){ return 'Rp ' + (Number(n)||0).toLocaleString('id-ID'); }

  function pad(n){ return (n<10?'0':'') + n; }
  function formatTime(ms){
    var d = new Date(ms);
    return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }

  // --- Add item to cart ---
  function addItem(){
    var harga = document.getElementById('harga').value;
    if (!harga){ toast('Pilih harga dulu.'); return; }
    var jenis = document.getElementById('jenis').value;

    var pel = [];
    document.querySelectorAll('.pl:checked').forEach(function(c){
      var label = c.value;
      if (label === 'Sambal') label = 'Sambal (' + document.getElementById('sambalSendok').value + ' sdk)';
      if (label === 'Kuah')   label = 'Kuah (' + document.getElementById('kuahJml').value + ')';
      pel.push(label);
    });

    cart.push({ jenis:jenis, harga:Number(harga), pelengkap:pel.join(', '), subtotal:Number(harga) });
    renderCart();
    resetItemForm();
    toast('Item ditambahkan.');
  }

  function resetItemForm(){
    document.getElementById('jenis').value = 'Tahu Pentol';
    document.getElementById('harga').value = '';
    document.querySelectorAll('.pl').forEach(function(c){ c.checked=false; c.closest('.chk').classList.remove('on'); });
    document.getElementById('sambalWrap').classList.add('hidden');
    document.getElementById('kuahWrap').classList.add('hidden');
  }

  function removeItem(i){ cart.splice(i,1); renderCart(); }

  function renderCart(){
    var list = document.getElementById('cartList');
    if (cart.length === 0){
      list.className = 'cart-empty';
      list.textContent = 'Belum ada item.';
      document.getElementById('grandTotal').textContent = 'Rp 0';
      return;
    }
    list.className = '';
    var html = '', total = 0;
    cart.forEach(function(it,i){
      total += it.subtotal;
      html += '<div class="line">'
        +   '<div class="line-info">'
        +     '<div class="line-title">'+it.jenis+'</div>'
        +     (it.pelengkap ? '<div class="line-sub">'+it.pelengkap+'</div>' : '')
        +   '</div>'
        +   '<div class="line-price">'+rupiah(it.subtotal)+'</div>'
        +   '<button class="line-del" onclick="removeItem('+i+')">✕</button>'
        + '</div>';
    });
    list.innerHTML = html;
    document.getElementById('grandTotal').textContent = rupiah(total);
  }

  // --- Submit to Firebase ---
  function submitOrder(){
    var nama = document.getElementById('nama').value.trim();
    if (!nama){ toast('Isi nama dulu.'); return; }
    if (cart.length === 0){ toast('Tambah minimal 1 item.'); return; }

    var total = cart.reduce(function(s,i){ return s+i.subtotal; }, 0);
    var order = { nama:nama, total:total, waktu:Date.now(), items:cart };

    // DEBUG: log order sebelum push
    console.log("📤 Submitting order:", order);

    var btn = document.getElementById('btnKirim');
    btn.disabled = true; btn.textContent = 'Mengirim…';

    pesananRef.push(order)
      .then(function(){
        // DEBUG: success
        console.log("✓ Order saved to Firebase!");
        btn.disabled = false; btn.textContent = 'Kirim Pesanan';
        cart = []; renderCart();
        document.getElementById('nama').value = '';
        toast('Pesanan terkirim ✓');
      })
      .catch(function(err){
        // DEBUG: error
        console.error("❌ Firebase push error:", err.code, err.message);
        btn.disabled = false; btn.textContent = 'Kirim Pesanan';
        toast('Gagal: ' + err.message);
      });
  }

  // --- Realtime report listener ---
  pesananRef.on('value', function(snap){
    var val = snap.val() || {};
    // DEBUG: log data dari DB
    console.log("📊 Data dari Firebase:", val);
    ordersCache = Object.keys(val).map(function(k){ return val[k]; });
    renderReport();
  }, function(err){
    // DEBUG: listener error
    console.error("❌ Listener error:", err.code, err.message);
    document.getElementById('reportBody').innerHTML = '<div class="muted">Gagal memuat: '+err.message+'</div>';
  });

  function renderReport(){
    var body = document.getElementById('reportBody');
    var flat = [];
    ordersCache.forEach(function(o){
      var items = o.items ? (Array.isArray(o.items) ? o.items : Object.keys(o.items).map(function(k){return o.items[k];})) : [];
      items.forEach(function(it){
        flat.push({ nama:o.nama, jenis:it.jenis, pelengkap:it.pelengkap, subtotal:it.subtotal, waktu:o.waktu });
      });
    });

    if (flat.length === 0){
      body.innerHTML = '<div class="muted">Belum ada pesanan.</div>';
      document.getElementById('reportTotal').textContent = 'Rp 0';
      return;
    }

    flat.sort(function(a,b){ return (b.waktu||0) - (a.waktu||0); });

    var html = '', total = 0;
    flat.forEach(function(r){
      total += Number(r.subtotal) || 0;
      html += '<div class="trow">'
        +   '<div class="tcol-main">'
        +     '<div class="tname">'+r.nama+'</div>'
        +     '<div class="tmeta">'+r.jenis+(r.pelengkap ? ' · '+r.pelengkap : '')+'</div>'
        +     '<div class="ttime">'+formatTime(r.waktu)+'</div>'
        +   '</div>'
        +   '<div class="tprice">'+rupiah(r.subtotal)+'</div>'
        + '</div>';
    });
    body.innerHTML = html;
    document.getElementById('reportTotal').textContent = rupiah(total);
  }

  // --- Toast ---
  var toastTimer;
  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  </script>
</body>
</html>
